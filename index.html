<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gladiator Souls</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #020308;
    color: #f8e38a;
    text-align: center;
  }

  h1 {
    font-size: 44px;
    letter-spacing: 4px;
    margin-top: 10px;
    text-shadow: 0 0 12px #f8e38a, 0 0 28px #f8e38a;
  }

  #topBar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 6px;
    font-size: 16px;
  }

  .hudIcon {
    width: 22px;
    height: 22px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 4px;
  }

  /* HEART ICON */
  .heartIcon { position: relative; }
  .heartIcon::before,
  .heartIcon::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 18px;
    background: radial-gradient(circle at 30% 20%, #fff5f5, #ff3b3b);
    border-radius: 12px 12px 8px 8px;
    box-shadow: 0 0 6px #ff4d4d;
  }
  .heartIcon::before { left: 2px; transform: rotate(-45deg); }
  .heartIcon::after { right: 2px; transform: rotate(45deg); }

  /* GOLD COIN ICON */
  .coinIcon {
    background: radial-gradient(circle at 30% 30%, #fff7c0, #f2c200 55%, #b8860b 100%);
    border-radius: 50%;
    box-shadow: 0 0 6px #f2c200;
    border: 2px solid rgba(255,255,255,0.4);
    position: relative;
  }
  .coinIcon::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35);
  }

  /* GEM ICON */
  .gemIcon {
    position: relative;
    background: linear-gradient(135deg, #b8ffff, #7fd4ff, #4a7dff);
    clip-path: polygon(50% 0%, 90% 30%, 75% 100%, 25% 100%, 10% 30%);
    box-shadow: 0 0 8px #7ff0ff;
  }
  .gemIcon::after {
    content: "";
    position: absolute;
    inset: 4px 6px;
    clip-path: polygon(50% 0%, 88% 32%, 72% 100%, 28% 100%, 12% 32%);
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(200,240,255,0.1));
  }

  button {
    padding: 10px 20px;
    margin: 6px;
    border: 2px solid #f8e38a;
    background: #141414;
    color: #f8e38a;
    cursor: pointer;
    font-weight: bold;
    transition: 0.15s;
    text-shadow: 0 0 6px #f8e38a55;
    font-size: 14px;
  }
  button:hover {
    background: #f8e38a;
    color: #141414;
    box-shadow: 0 0 12px #f8e38a;
  }

  #mainMenu { margin-top: 16px; }
  #gameUI { display: none; margin-top: 6px; }

  #hud {
    display: flex;
    justify-content: center;
    gap: 18px;
    font-size: 14px;
    margin-bottom: 6px;
  }

  #soulBarOuter {
    width: 210px;
    height: 8px;
    border: 1px solid #4fd4ff;
    background: #05060a;
    border-radius: 999px;
    overflow: hidden;
    box-shadow: 0 0 10px #4fd4ff55;
  }
  #soulBarInner {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4fd4ff, #9fd4ff, #ffffff);
  }

  #arenaWrapper {
    display: flex;
    justify-content: center;
    margin-top: 4px;
  }

  canvas {
    background: radial-gradient(circle at center, #10101a 0%, #05060a 65%, #000000 100%);
    border-radius: 50%;
    border: 3px solid #f8e38a;
    box-shadow: 0 0 22px #f8e38a88, 0 0 50px #000000;
  }
  .arena2 {
    background: radial-gradient(circle at center, #2a0044 0%, #050011 65%, #000000 100%);
    border-color: #aaf;
    box-shadow: 0 0 22px #aaf, 0 0 50px #000000;
  }

  #upgradeScreen, #forgeScreen {
    display: none;
    margin-top: 12px;
  }

  .panelTitle {
    font-size: 22px;
    margin-bottom: 8px;
    text-shadow: 0 0 10px #f8e38a;
  }

  .upgradeList {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 780px;
    margin: 0 auto;
  }

  .upgradeCard {
    border: 1px solid #f8e38a;
    padding: 8px;
    width: 190px;
    background: #111;
    font-size: 12px;
    border-radius: 6px;
    box-shadow: 0 0 10px #f8e38a33;
  }

  #message {
    margin-top: 6px;
    font-size: 13px;
    min-height: 18px;
  }

  #togglesBar {
    margin-top: 6px;
    font-size: 13px;
  }
  #togglesBar label { cursor: pointer; }
</style>
</head>

<body>
<h1>GLADIATOR SOULS</h1>

<div id="topBar">
  <div><span class="hudIcon heartIcon"></span><span id="hpTop">100</span></div>
  <div><b>SOUL POWER:</b> <span id="soulReadyLabel">Charging</span></div>
  <div><span class="hudIcon coinIcon"></span><span id="goldTop">0</span></div>
  <div><span class="hudIcon gemIcon"></span><span id="gemsTop">0</span></div>
</div>

<div id="togglesBar">
  <label style="color:#f8e38a;">
    <input type="checkbox" id="autoBounceToggle">
    Auto Bounce
  </label>
</div>

<div id="mainMenu">
  <button id="beginCareerBtn">BEGIN CAREER</button>

  <!-- NEW: Arena II button (hidden until ascension) -->
  <button id="arena2Btn" style="display:none;">ARENA II</button>

  <button id="forgeMenuBtn">THE ETERNAL FORGE</button>

  <!-- NEW: Dev button hidden by default -->
  <button id="devBtn" style="opacity:0.15;">DEV</button>
</div>

<div id="gameUI">
  <div id="hud">
    <div><b>Round:</b> <span id="roundLabel">1</span></div>
    <div><b>Class:</b> <span id="classLabel">Gladiator</span></div>
    <div id="soulBarOuter"><div id="soulBarInner"></div></div>
  </div>

  <div id="arenaWrapper">
    <canvas id="arena" width="420" height="420"></canvas>
  </div>

  <div id="message"></div>
</div>

<div id="upgradeScreen">
  <div class="panelTitle">UPGRADES & CLASSES</div>
  <div><b>Gold:</b> <span id="upgradeGoldLabel">0</span></div>
  <div style="margin:4px 0;">
    <select id="classSelect"></select>
    <button id="startNextRoundBtn">Start Next Round</button>
  </div>
  <div class="upgradeList" id="upgradeList"></div>
</div>

<div id="forgeScreen">
  <div class="panelTitle">THE ETERNAL FORGE</div>
  <div><b>Soul Gems:</b> <span id="forgeSoulGemsLabel">0</span></div>
  <div class="upgradeList" id="forgeList"></div>
  <button id="backToMenuFromForgeBtn">Back to Main Menu</button>
</div>

<div id="devPanel" style="display:none; margin-top:20px;">
  <div class="panelTitle">DEVELOPER MODE</div>

  <button onclick="gold += 1000; updateHUD();">+1000 Gold</button>
  <button onclick="soulGems += 10; updateHUD();">+10 Soul Gems</button>
  <button onclick="round++; spawnEnemies(); updateHUD();">Skip Round</button>
  <button onclick="player.hp = player.maxHp; updateHUD();">Full Heal</button>
  <button onclick="Object.values(classes).forEach(c=>c.mastery=3); buildUpgradeScreen();">Max Mastery</button>
  <button onclick="resetDevState()">Reset Game State</button>
</div>

<!-- END OF PART 1 – CONTINUE -->

<script>

document.getElementById("devBtn").onclick = () => {
  const pass = prompt("Enter developer password:");
  if (pass === "whatisthisdiddibluddoingongladiatorsouls") {
    document.getElementById("devPanel").style.display = "block";
    alert("Developer Mode Activated");
  } else {
    alert("Incorrect password.");
  }
};

/* ===================================================== */
/* =============== SECTION: GLOBAL STATE ================ */
/* ===================================================== */

const canvas = document.getElementById("arena");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const center = { x: W/2, y: H/2 };
const arenaRadius = 190;

let inGame = false;
let inUpgrade = false;
let inForge = false;
let arenaTier = 1;

/* NEW: Ascension counter */
let ascension = 0;

let round = 1;
let gold = 0;
let soulGems = 0;
let totalKills = 0;

let soulPower = 0;
let soulPowerMax = 100;
let soulReady = false;

let player;
let enemies = [];
let hitEffects = [];
let projectiles = [];
let keys = {};
let lastTime = 0;
let bossMode = false;
let autoBounce = false;

/* ===================================================== */
/* =============== SECTION: CLASS DEFINITIONS =========== */
/* ===================================================== */

const classes = [
  {
    id:"gladiator",
    name:"Gladiator",
    unlocked:true,
    mastery:0,
    base:{hp:10,dmg:1,spd:0.12,soul:1},
    color:{inner:"#e8f5ff", mid:"#9fd4ff", outer:"#3f9dff"},
    weapon:"sword"
  },
  {
    id:"berserker",
    name:"Berserker",
    unlocked:true,
    mastery:0,
    base:{hp:8,dmg:2,spd:0.14,soul:1},
    color:{inner:"#ffe8e8", mid:"#ff9b5a", outer:"#ff3b3b"},
    weapon:"axe"
  },
  {
    id:"mage",
    name:"Battle Mage",
    unlocked:false,
    mastery:0,
    base:{hp:7,dmg:1.5,spd:0.11,soul:1.5},
    color:{inner:"#f0e8ff", mid:"#b38cff", outer:"#6a3bff"},
    weapon:"staff"
  },
  {
    id:"monk",
    name:"Monk",
    unlocked:false,
    mastery:0,
    base:{hp:9,dmg:1.4,spd:0.16,soul:1.3},
    color:{inner:"#fffbe0", mid:"#ffe066", outer:"#ffbf00"},
    weapon:"chakram"
  },
  {
    id:"paladin",
    name:"Paladin",
    unlocked:false,
    mastery:0,
    base:{hp:12,dmg:2.2,spd:0.10,soul:1.0},
    color:{inner:"#ffffff", mid:"#fff4c4", outer:"#ffd700"},
    weapon:"hammer"
  },
  {
    id:"assassin",
    name:"Assassin",
    unlocked:false,
    mastery:0,
    base:{hp:7,dmg:1.8,spd:0.18,soul:1.5},
    color:{inner:"#e0ffff", mid:"#7ff0ff", outer:"#00c8ff"},
    weapon:"daggers"
  },
  {
    id:"grim",
    name:"Grim Reaper",
    unlocked:false,
    mastery:0,
    base:{hp:10,dmg:2.5,spd:0.14,soul:2.0},
    color:{inner:"#f0e0ff", mid:"#a050ff", outer:"#3b0044"},
    weapon:"scythe"
  },

  /* ⭐ NEW CLASS: Celestial Warlock (Arena II) */
  {
    id:"warlock",
    name:"Celestial Warlock",
    unlocked:false,
    mastery:0,
    base:{hp:11,dmg:2.8,spd:0.15,soul:2.2},
    color:{inner:"#ffffff", mid:"#9fd4ff", outer:"#4fd4ff"},
    weapon:"cosmicstaff"   /* NEW weapon type */
  }
];

let currentClass = classes[0];

/* ===================================================== */
/* =============== SECTION: PERMANENT BONUSES ========== */
/* ===================================================== */

const perm = { hp:0, dmg:0, spd:0, soul:0, maxHp:0 };

/* ===================================================== */
/* =============== SECTION: UPGRADE DEFINITIONS ========= */
/* ===================================================== */

const upgrades = [
  { name:"+2 Max HP", cost:20, fn:p=>{ perm.maxHp += 2; } },
  { name:"+1 Damage", cost:25, fn:p=>p.dmg+=1 },
  { name:"+0.04 Speed", cost:25, fn:p=>p.spd+=0.04 },
  { name:"+25% Soul Gain", cost:30, fn:p=>p.soulGain+=0.25 },
  { name:"Mastery +1", cost:40, fn:p=>currentClass.mastery++ }
];

const forgeUpgrades = [
  { name:"Permanent +2 Max HP", cost:3, fn:()=>perm.hp+=2 },
  { name:"Permanent +1 Damage", cost:3, fn:()=>perm.dmg+=1 },
  { name:"Permanent +0.04 Speed", cost:4, fn:()=>perm.spd+=0.04 },
  { name:"Permanent +20% Soul Gain", cost:4, fn:()=>perm.soul+=0.2 }
];

/* ===================================================== */
/* =============== SECTION: PLAYER CREATION ============ */
/* ===================================================== */

function createPlayer() {
  const b = currentClass.base;
  const baseSpeed = (b.spd + perm.spd) * 1.9;

  const dir = Math.random() * Math.PI * 2;
  return {
    x:center.x, y:center.y,
    vx:Math.cos(dir)*baseSpeed,
    vy:Math.sin(dir)*baseSpeed,
    r:13,
    hp:100 + perm.hp + perm.maxHp,
    maxHp:100 + perm.hp + perm.maxHp,
    dmg:b.dmg + perm.dmg,
    spd:b.spd + perm.spd,
    soulGain:b.soul + perm.soul,
    invuln:0,
    angle:0,
    baseSpeed,
    color: currentClass.color,
    weapon: currentClass.weapon
  };
}

/* ===================================================== */
/* =============== SECTION: ENEMY TYPES ================= */
/* ===================================================== */

const enemyTypes = {
  basic: {
    hpBase: 17,
    hpScale: 2,
    r: 16,
    speedMin: 0.12,
    speedMax: 0.17,
    color:"#ff7b00",
    weight:6
  },
  fastling: {
    hpBase: 10,
    hpScale: 1.5,
    r: 12,
    speedMin: 0.20,
    speedMax: 0.28,
    color:"#00e0ff",
    weight:4
  },
  bruiser: {
    hpBase: 40,
    hpScale: 4,
    r: 22,
    speedMin: 0.08,
    speedMax: 0.11,
    color:"#ff0055",
    weight:2
  },
  seeker: {
    hpBase: 20,
    hpScale: 2.5,
    r: 15,
    speedMin: 0.14,
    speedMax: 0.18,
    color:"#9f00ff",
    weight:2
  },
  charger: {
    hpBase: 30,
    hpScale: 3,
    r: 18,
    speedMin: 0.10,
    speedMax: 0.14,
    color:"#ffaa00",
    weight:1
  },
  specter: {
    hpBase: 22,
    hpScale: 2.2,
    r: 16,
    speedMin: 0.12,
    speedMax: 0.16,
    color:"#7f00ff",
    weight:1
  }
};

/* ===================================================== */
/* =============== SECTION: BOSS DEFINITION ============= */
/* ===================================================== */

const bossStats = {
  hp: 7420,
  r: 28,
  speed: 0.14,
  color: "#ff00ff"
};

/* ===================================================== */
/* =============== SECTION: ENEMY CREATION ============= */
/* ===================================================== */

function chooseEnemyType() {
  let pool = [];

  pool.push(...Array(enemyTypes.basic.weight).fill("basic"));
  if (round >= 4)  pool.push(...Array(enemyTypes.fastling.weight).fill("fastling"));
  if (round >= 8)  pool.push(...Array(enemyTypes.bruiser.weight).fill("bruiser"));
  if (round >= 12) pool.push(...Array(enemyTypes.seeker.weight).fill("seeker"));
  if (round >= 16) pool.push(...Array(enemyTypes.charger.weight).fill("charger"));
  if (round >= 20) pool.push(...Array(enemyTypes.specter.weight).fill("specter"));

  return pool[Math.floor(Math.random()*pool.length)];
}

function createEnemy(type="basic") {

  /* ⭐ NEW: Arena II enemy color tint */
  const arena2Tint = arenaTier === 2 ? "#aaf" : null;

  if (type==="boss") {
    const dir = Math.random()*Math.PI*2;
    return {
      x:center.x + Math.cos(dir)*(arenaRadius-40),
      y:center.y + Math.sin(dir)*(arenaRadius-40),
      vx:Math.cos(dir)*bossStats.speed,
      vy:Math.sin(dir)*bossStats.speed,
      r:bossStats.r,
      hp:bossStats.hp,
      maxHp:bossStats.hp,
      color: arena2Tint || bossStats.color,
      type:"boss",
      baseSpeed:bossStats.speed,
      summonTimer:0
    };
  }

  const data = enemyTypes[type];
  const angle = Math.random()*Math.PI*2;
  const ex = center.x + Math.cos(angle)*(arenaRadius-30);
  const ey = center.y + Math.sin(angle)*(arenaRadius-30);

  /* ⭐ NEW: Arena II HP scaling */
  const hpMultiplier = arenaTier === 2 ? 1.35 : 1;

  const hp = (data.hpBase + round * data.hpScale) * hpMultiplier;
  const speed = (data.speedMin + Math.random()*(data.speedMax-data.speedMin)) * 1.8;

  const dir = Math.random()*Math.PI*2;

  return {
    x:ex, y:ey,
    vx:Math.cos(dir)*speed,
    vy:Math.sin(dir)*speed,
    r:data.r,
    hp, maxHp:hp,
    color: arena2Tint || data.color,
    type,
    baseSpeed:speed
  };
}

/* ===================================================== */
/* =============== SECTION: SPAWNING ==================== */
/* ===================================================== */

function spawnEnemies() {
  enemies = [];
  bossMode = (round === 24);

  if (bossMode) {
    enemies.push(createEnemy("boss"));
    document.getElementById("message").textContent =
      "Final Boss: The Soul Tyrant!";
    return;
  }

  const count = 4 + Math.floor(round * 0.7);

  for (let i=0; i<count; i++) {
    const t = chooseEnemyType();
    enemies.push(createEnemy(t));
  }
}

/* ===================================================== */
/* =============== SECTION: HUD UPDATE ================= */
/* ===================================================== */

function updateHUD() {
  if (!player) return;
  document.getElementById("hpTop").textContent = player.hp.toFixed(0);
  document.getElementById("goldTop").textContent = gold.toFixed(0);
  document.getElementById("gemsTop").textContent = soulGems;
  document.getElementById("roundLabel").textContent = round;
  document.getElementById("classLabel").textContent = currentClass.name;
  document.getElementById("soulBarInner").style.width =
    (soulPower/soulPowerMax*100)+"%";
  document.getElementById("soulReadyLabel").textContent =
    soulReady ? "READY" : "Charging";
}

/* ===================================================== */
/* =============== SECTION: INPUT HANDLING ============= */
/* ===================================================== */

window.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if (e.key===" ") {
    if (inGame && soulReady) useSoulPower();
  }
});
window.addEventListener("keyup", e=>keys[e.key.toLowerCase()] = false);

document.getElementById("autoBounceToggle").onchange = (e)=>{
  autoBounce = e.target.checked;
  if (autoBounce && player) {
    const dir = Math.random() * Math.PI * 2;
    player.vx = Math.cos(dir) * player.baseSpeed;
    player.vy = Math.sin(dir) * player.baseSpeed;
  }
};

/* ===================================================== */
/* =============== SECTION: SOUL POWER ================= */
/* ===================================================== */

function gainSoul(amount) {
  soulPower += amount * player.soulGain;
  if (soulPower >= soulPowerMax) {
    soulPower = soulPowerMax;
    soulReady = true;
  }
}

function spawnHitEffect(x, y, hexColor) {
  const r = parseInt(hexColor.slice(1,3),16);
  const g = parseInt(hexColor.slice(3,5),16);
  const b = parseInt(hexColor.slice(5,7),16);

  hitEffects.push({
    x,
    y,
    r: 0,
    alpha: 1,
    color: { r, g, b }
  });
}

function useSoulPower() {
  soulReady = false;
  soulPower = 0;

  /* CLASS-SPECIFIC SOUL POWERS */

  if (currentClass.id==="gladiator") {
    player.invuln = 4000;
    player.dmg *= 2;
    setTimeout(()=>player.dmg/=2, 4000);
    document.getElementById("message").textContent =
      "Gladiator: Invulnerable + Double Damage!";
  }

  else if (currentClass.id==="berserker") {
    enemies.forEach(e=>{
      const d = Math.hypot(e.x-player.x, e.y-player.y);
      if (d < 120) {
        applySwordDamage(e, player.dmg*8);
        spawnHitEffect(e.x, e.y, e.color);
      }
    });
    document.getElementById("message").textContent =
      "Berserker: Shockwave!";
  }

  else if (currentClass.id==="mage") {
    for (let i=0; i<12; i++) {
      const a = i*Math.PI*2/12;
      projectiles.push({
        x:player.x, y:player.y,
        vx:Math.cos(a)*0.4,
        vy:Math.sin(a)*0.4,
        r:4,
        dmg:player.dmg*3
      });
    }
    spawnHitEffect(player.x, player.y, "#b38cff");
    document.getElementById("message").textContent =
      "Battle Mage: Arcane Ring!";
  }

  else if (currentClass.id==="monk") {
    player.invuln = 4000;
    player.baseSpeed *= 1.6;
    setTimeout(()=>player.baseSpeed/=1.6, 4000);
    spawnHitEffect(player.x, player.y, "#ffbf00");
    document.getElementById("message").textContent =
      "Monk: Flow State!";
  }

  else if (currentClass.id==="paladin") {
    player.invuln = 3000;
    enemies.forEach(e=>{
      const d = Math.hypot(e.x-player.x, e.y-player.y);
      if (d < 130) {
        applySwordDamage(e, player.dmg*5);
        spawnHitEffect(e.x, e.y, "#ffd700");
      }
    });
    document.getElementById("message").textContent =
      "Paladin: Divine Shield!";
  }

  else if (currentClass.id==="assassin") {
    let nearest = null, nd = Infinity;
    enemies.forEach(e=>{
      const d = Math.hypot(e.x-player.x, e.y-player.y);
      if (d < nd) { nd = d; nearest = e; }
    });
    if (nearest) {
      const angle = Math.atan2(nearest.y-player.y, nearest.x-player.x);
      const backDist = nearest.r + player.r + 5;
      player.x = nearest.x - Math.cos(angle)*backDist;
      player.y = nearest.y - Math.sin(angle)*backDist;
      spawnHitEffect(nearest.x, nearest.y, "#7ff0ff");
    }
    player.dmg *= 3;
    setTimeout(()=>player.dmg/=3, 3000);
    document.getElementById("message").textContent =
      "Assassin: Shadow Step!";
  }

  else if (currentClass.id==="grim") {
    let healed = 0;

    enemies = enemies.filter(e=>{
      if (e.type === "boss") return true;

      const killThreshold = (currentClass.mastery >= 5) ? 50 : e.maxHp * 0.4;

      if (e.hp < killThreshold) {
        totalKills++;
        healed += (currentClass.mastery >= 5 ? 10 : 4);
        spawnHitEffect(e.x, e.y, "#a050ff");
        return false;
      }
      return true;
    });

    player.hp = Math.min(player.maxHp, player.hp + healed);

    document.getElementById("message").textContent =
      (currentClass.mastery >= 5)
      ? "Grim Reaper: Grand Harvest!"
      : "Grim Reaper: Harvest!";
  }

  /* ⭐ NEW: Celestial Warlock Soul Power */
  else if (currentClass.id==="warlock") {
    enemies.forEach(e=>{
      const d = Math.hypot(e.x-player.x, e.y-player.y);
      if (d < 150) {
        applySwordDamage(e, player.dmg * 6);
        spawnHitEffect(e.x, e.y, "#9fd4ff");
      }
    });
    spawnHitEffect(player.x, player.y, "#4fd4ff");
    document.getElementById("message").textContent =
      "Celestial Warlock: Supernova Burst!";
  }

  updateHUD();
}

/* ===================================================== */
/* =============== SECTION: DAMAGE + DEATH ============= */
/* ===================================================== */

function applySwordDamage(e, dmg) {
  if (e.type==="boss") {
    const maxAllowed = e.hp * 0.33;
    dmg = Math.min(dmg, maxAllowed);
  }
  e.hp -= dmg;

  spawnHitEffect(e.x, e.y, e.color);

  if (e.hp <= 0) {
    totalKills++;

    /* ⭐ NEW: Arena II gold scaling */
    const goldMult = arenaTier === 2 ? 1.5 : 1;

    gold += ((3 + round * 0.5) * 3) * goldMult;

    if (totalKills % 5 === 0) soulGems++;

    spawnHitEffect(e.x, e.y, e.color);
  }
}

function handleDeaths() {
  enemies = enemies.filter(e=>e.hp>0);

  if (enemies.length === 0) {

    if (bossMode) {

      /* ⭐ NEW: Ascension trigger */
      ascension++;
      document.getElementById("message").textContent =
        "Final Boss defeated! Ascension +" + ascension;

      setTimeout(()=>{
        showAscensionTransition();
      }, 1500);

    } else {

      round++;
      inGame = false;
      document.getElementById("gameUI").style.display="none";
      document.getElementById("upgradeScreen").style.display="block";
      buildUpgradeScreen();
    }
  }
}

/* ===================================================== */
/* ========== SECTION: PHYSICS HELPERS ================= */
/* ===================================================== */

function normalizeToSpeed(obj, targetSpeed) {
  const s = Math.hypot(obj.vx, obj.vy);
  if (s === 0) return;
  obj.vx = obj.vx / s * targetSpeed;
  obj.vy = obj.vy / s * targetSpeed;
}

/* ===================================================== */
/* ========== SECTION: UPDATE LOOP ===================== */
/* ===================================================== */

function update(dt) {
  if (!player) return;

  /* -------- PLAYER MOVEMENT -------- */
  const accel = 0.0005 * 1.3;

  if (!autoBounce) {
    if (keys["w"]) player.vy -= accel*dt;
    if (keys["s"]) player.vy += accel*dt;
    if (keys["a"]) player.vx -= accel*dt;
    if (keys["d"]) player.vx += accel*dt;
  } else {
    normalizeToSpeed(player, player.baseSpeed);
  }

  const ps = Math.hypot(player.vx, player.vy);
  if (ps > player.baseSpeed) {
    player.vx = player.vx/ps * player.baseSpeed;
    player.vy = player.vy/ps * player.baseSpeed;
  }

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  /* -------- PLAYER WALL BOUNCE -------- */
  let dist = Math.hypot(player.x-center.x, player.y-center.y);
  if (dist > arenaRadius - player.r) {
    const nx = (player.x-center.x)/dist;
    const ny = (player.y-center.y)/dist;
    const dot = player.vx*nx + player.vy*ny;
    player.vx -= 2*dot*nx;
    player.vy -= 2*dot*ny;
    player.x = center.x + nx*(arenaRadius-player.r);
    player.y = center.y + ny*(arenaRadius-player.r);
    normalizeToSpeed(player, player.baseSpeed);
  }

  if (player.invuln > 0) {
    player.invuln -= dt;
    if (player.invuln < 0) player.invuln = 0;
  }

  /* -------- ENEMY MOVEMENT + AI -------- */
  enemies.forEach(e=>{
    if (e.type === "seeker") {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      const steer = 0.00025 * dt;
      e.vx += (dx/d)*steer;
      e.vy += (dy/d)*steer;
      normalizeToSpeed(e, e.baseSpeed);
    }

    if (e.type === "charger") {
      if (!e.chargeTimer) e.chargeTimer = 0;
      e.chargeTimer += dt;
      if (e.chargeTimer > 2000) {
        e.chargeTimer = 0;
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.hypot(dx, dy) || 1;
        e.vx = (dx/d) * e.baseSpeed * 2.2;
        e.vy = (dy/d) * e.baseSpeed * 2.2;
      }
    }

    if (e.type === "boss") {
      if (!e.summonTimer) e.summonTimer = 0;
      if (!e.waveTimer) e.waveTimer = 0;
      e.summonTimer += dt;
      e.waveTimer += dt;

      if (e.summonTimer > 5000) {
        e.summonTimer = 0;
        for (let i=0;i<3;i++) enemies.push(createEnemy("fastling"));
      }

      if (e.waveTimer > 4000) {
        e.waveTimer = 0;
        const d = Math.hypot(player.x-e.x, player.y-e.y);
        if (d < 120 && player.invuln<=0) {
          player.hp -= 12;
          spawnHitEffect(player.x, player.y, "#ff00ff");
          if (player.hp <= 0) {
            player.hp = 0;
            inGame = false;
            document.getElementById("message").textContent = "You died.";
            setTimeout(()=>returnToHomeAfterDeath(),1500);
          }
        }
      }
    }

    e.x += e.vx * dt;
    e.y += e.vy * dt;

    const d = Math.hypot(e.x-center.x, e.y-center.y);

    if (e.type !== "specter") {
      if (d > arenaRadius - e.r) {
        const nx = (e.x-center.x)/d;
        const ny = (e.y-center.y)/d;
        const dot = e.vx*nx + e.vy*ny;
        e.vx -= 2*dot*nx;
        e.vy -= 2*dot*ny;
        e.x = center.x + nx*(arenaRadius-e.r);
        e.y = center.y + ny*(arenaRadius-e.r);
        normalizeToSpeed(e, e.baseSpeed);
      }
    } else {
      if (d > arenaRadius + 40) {
        const nx = (center.x-e.x)/d;
        const ny = (center.y-e.y)/d;
        e.vx += nx*0.0003*dt;
        e.vy += ny*0.0003*dt;
      }
    }
  });

  /* -------- PLAYER–ENEMY OVERLAP -------- */
  enemies.forEach(e=>{
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const d = Math.hypot(dx, dy);
    const minDist = e.r + player.r;

    if (d > 0 && d < minDist) {
      const nx = dx/d;
      const ny = dy/d;
      const overlap = (minDist - d) * 0.5;

      player.x -= nx * overlap;
      player.y -= ny * overlap;
      e.x += nx * overlap;
      e.y += ny * overlap;

      if (player.invuln <= 0) {
        let dmg = 0.12;
        if (e.type==="boss") dmg *= 6;
        if (e.type==="bruiser") dmg *= 2;
        if (e.type==="charger") dmg *= 2.5;
        player.hp -= dmg;
        spawnHitEffect(player.x, player.y, "#ff3b3b");
        if (player.hp <= 0) {
          player.hp = 0;
          inGame = false;
          document.getElementById("message").textContent = "You died.";
          setTimeout(()=>returnToHomeAfterDeath(),1500);
        }
      }
    }
  });

  /* -------- SWORD HIT DETECTION -------- */
  const swordLength = 40;
  const swordTipRadius = 10;
  const sx = player.x + Math.cos(player.angle) * (player.r + swordLength);
  const sy = player.y + Math.sin(player.angle) * (player.r + swordLength);

  enemies.forEach(e=>{
    const d = Math.hypot(e.x - sx, e.y - sy);
    if (d < e.r + swordTipRadius) {
      applySwordDamage(e, player.dmg);
      gainSoul(0.5);
      spawnHitEffect(sx, sy, e.color);
    }
  });

  /* -------- PROJECTILES -------- */
  projectiles.forEach(p=>{
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  });

  projectiles = projectiles.filter(p=>{
    const d = Math.hypot(p.x-center.x, p.y-center.y);
    return d < arenaRadius + 20;
  });

  projectiles.forEach(p=>{
    enemies.forEach(e=>{
      const d = Math.hypot(e.x-p.x, e.y-p.y);
      if (d < e.r + p.r) {
        applySwordDamage(e, p.dmg);
        gainSoul(0.5);
        spawnHitEffect(p.x, p.y, "#7ff0ff");
        p._hit = true;
      }
    });
  });

  projectiles = projectiles.filter(p=>!p._hit);

  /* -------- ROUND END -------- */
  handleDeaths();

  if (soulPower >= soulPowerMax) {
    soulPower = soulPowerMax;
    soulReady = true;
  }

  /* -------- WEAPON SPIN SPEED -------- */
  player.angle += 0.09 * (soulReady ? 2.5 : 1.6);

  updateHUD();
}

/* ===================================================== */
/* ========== SECTION: DRAWING ENGINE =================== */
/* ===================================================== */

function drawWeapon(ctx, p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  const w = p.weapon;

  /* ============================================================
     SWORD — polished but unchanged silhouette
  ============================================================ */
  if (w === "sword") {
    // HILT
    ctx.fillStyle = "#3b2a1a";
    ctx.fillRect(p.r - 4, -6, 10, 12);

    // CROSSGUARD
    ctx.fillStyle = "#d4c28a";
    ctx.fillRect(p.r + 6, -10, 6, 20);

    // BLADE
    const bladeGrad = ctx.createLinearGradient(p.r + 12, 0, p.r + 52, 0);
    bladeGrad.addColorStop(0, "#ffffff");
    bladeGrad.addColorStop(1, "#c0d8ff");

    ctx.fillStyle = bladeGrad;
    ctx.beginPath();
    ctx.moveTo(p.r + 12, -3);
    ctx.lineTo(p.r + 52, 0);
    ctx.lineTo(p.r + 12, 3);
    ctx.closePath();
    ctx.shadowColor = "#cfe9ff";
    ctx.shadowBlur = 18;
    ctx.fill();
  }

  /* ============================================================
     AXE — polished glow, same silhouette
  ============================================================ */
  else if (w === "axe") {
    // HANDLE
    ctx.fillStyle = "#4b2e14";
    ctx.fillRect(p.r, -3, 32, 6);

    // LEFT BLADE
    ctx.beginPath();
    ctx.moveTo(p.r + 32, -12);
    ctx.quadraticCurveTo(p.r + 50, 0, p.r + 32, 12);
    ctx.lineTo(p.r + 24, 12);
    ctx.quadraticCurveTo(p.r + 38, 0, p.r + 24, -12);
    ctx.closePath();

    const axeGrad = ctx.createLinearGradient(p.r + 24, 0, p.r + 50, 0);
    axeGrad.addColorStop(0, "#ffffff");
    axeGrad.addColorStop(1, "#ff4444");

    ctx.fillStyle = axeGrad;
    ctx.shadowColor = "#ff4444";
    ctx.shadowBlur = 20;
    ctx.fill();

    // RIGHT BLADE (mirrored)
    ctx.save();
    ctx.scale(-1, 1);
    ctx.translate(-(p.r + 32) * 2, 0);

    ctx.beginPath();
    ctx.moveTo(p.r + 32, -12);
    ctx.quadraticCurveTo(p.r + 50, 0, p.r + 32, 12);
    ctx.lineTo(p.r + 24, 12);
    ctx.quadraticCurveTo(p.r + 38, 0, p.r + 24, -12);
    ctx.closePath();

    ctx.fillStyle = axeGrad;
    ctx.shadowColor = "#ff4444";
    ctx.shadowBlur = 20;
    ctx.fill();

    ctx.restore();
  }

  /* ============================================================
     STAFF — unchanged, polished orb
  ============================================================ */
  else if (w === "staff") {
    ctx.fillStyle = "#6b4cff";
    ctx.fillRect(p.r, -2, 36, 4);

    ctx.beginPath();
    ctx.arc(p.r + 40, 0, 9, 0, Math.PI * 2);

    const orb = ctx.createRadialGradient(p.r + 40, 0, 1, p.r + 40, 0, 9);
    orb.addColorStop(0, "#ffffff");
    orb.addColorStop(0.4, "#b8a0ff");
    orb.addColorStop(1, "#6a3bff");

    ctx.fillStyle = orb;
    ctx.shadowColor = "#b38cff";
    ctx.shadowBlur = 22;
    ctx.fill();
  }

  /* ============================================================
     CHAKRAM — same silhouette, improved spikes
  ============================================================ */
  else if (w === "chakram") {
    ctx.beginPath();
    ctx.arc(p.r + 26, 0, 12, 0, Math.PI * 2);

    const ring = ctx.createLinearGradient(p.r + 14, 0, p.r + 38, 0);
    ring.addColorStop(0, "#fff4c4");
    ring.addColorStop(1, "#ffbf00");

    ctx.strokeStyle = ring;
    ctx.lineWidth = 5;
    ctx.shadowColor = "#ffd94a";
    ctx.shadowBlur = 20;
    ctx.stroke();

    // Spikes
    ctx.fillStyle = "#ffbf00";
    for (let i = 0; i < 6; i++) {
      const ang = (i * Math.PI * 2) / 6;
      const sx = p.r + 26 + Math.cos(ang) * 12;
      const sy = Math.sin(ang) * 12;

      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(ang) * 6, sy + Math.sin(ang) * 6);
      ctx.lineTo(sx + Math.cos(ang + 0.4) * 4, sy + Math.sin(ang + 0.4) * 4);
      ctx.closePath();
      ctx.fill();
    }
  }

  /* ============================================================
     HAMMER — polished metal gradient
  ============================================================ */
  else if (w === "hammer") {
    ctx.fillStyle = "#8b6f3a";
    ctx.fillRect(p.r, -2, 32, 4);

    ctx.beginPath();
    ctx.rect(p.r + 32, -12, 20, 24);

    const metal = ctx.createLinearGradient(p.r + 32, 0, p.r + 52, 0);
    metal.addColorStop(0, "#ffffff");
    metal.addColorStop(0.4, "#ffe89a");
    metal.addColorStop(1, "#ffd700");

    ctx.fillStyle = metal;
    ctx.shadowColor = "#fff4c4";
    ctx.shadowBlur = 26;
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.r + 42, -10);
    ctx.lineTo(p.r + 42, 10);
    ctx.moveTo(p.r + 32, 0);
    ctx.lineTo(p.r + 52, 0);
    ctx.stroke();
  }

  /* ============================================================
     DAGGERS — unchanged, polished glow
  ============================================================ */
  else if (w === "daggers") {
    const blade = ctx.createLinearGradient(p.r, 0, p.r + 20, 0);
    blade.addColorStop(0, "#ffffff");
    blade.addColorStop(1, "#7ff0ff");

    // Forward dagger
    ctx.beginPath();
    ctx.moveTo(p.r, -2);
    ctx.lineTo(p.r + 20, 0);
    ctx.lineTo(p.r, 2);
    ctx.closePath();
    ctx.fillStyle = blade;
    ctx.shadowColor = "#7ff0ff";
    ctx.shadowBlur = 16;
    ctx.fill();

    // Backward dagger
    ctx.save();
    ctx.rotate(Math.PI);
    ctx.beginPath();
    ctx.moveTo(p.r, -2);
    ctx.lineTo(p.r + 20, 0);
    ctx.lineTo(p.r, 2);
    ctx.closePath();
    ctx.fillStyle = blade;
    ctx.fill();
    ctx.restore();
  }

  /* ============================================================
     GRIM REAPER SCYTHE — NEW HYBRID VERSION (Option C)
  ============================================================ */
 else if (w === "scythe") {
  // HANDLE — vertical, dark cosmic wood
  const handleGrad = ctx.createLinearGradient(p.r, 0, p.r + 42, 0);
  handleGrad.addColorStop(0, "#12060d");
  handleGrad.addColorStop(1, "#3b1a2a");
  ctx.fillStyle = handleGrad;
  ctx.fillRect(p.r, -2, 42, 4);

  // BLADE — smaller, thinner, perfect 90° angle, elegant curve
  ctx.beginPath();

  // Base of blade (spiky ridge near handle)
  ctx.moveTo(p.r + 42, -2);
  ctx.lineTo(p.r + 48, -10);   // spike #1
  ctx.lineTo(p.r + 54, -4);    // spike #2

  // OUTER CURVE — smaller, thinner, elegant
  ctx.quadraticCurveTo(
    p.r + 110, -10,   // reduced forward reach
    p.r + 92, 28      // smaller downward hook
  );

  // INNER EDGE — jagged but subtle
  ctx.quadraticCurveTo(
    p.r + 75, 12,     // inner belly
    p.r + 60, 6       // slight inward dip
  );
  ctx.lineTo(p.r + 52, 2);      // small inner spike

  // Return to handle
  ctx.quadraticCurveTo(
    p.r + 46, 0,
    p.r + 42, -2
  );

  ctx.closePath();

  // BLADE GRADIENT — white-hot edge → void purple
  const bladeGrad = ctx.createLinearGradient(p.r + 42, 0, p.r + 110, 0);
  bladeGrad.addColorStop(0, "#ffffff");
  bladeGrad.addColorStop(0.2, "#e8d4ff");
  bladeGrad.addColorStop(0.5, "#b38cff");
  bladeGrad.addColorStop(1, "#6a3bff");

  ctx.fillStyle = bladeGrad;
  ctx.shadowColor = "#b38cff";
  ctx.shadowBlur = 34;
  ctx.fill();

  // OUTER EDGE HIGHLIGHT — razor-thin, elegant
  ctx.beginPath();
  ctx.moveTo(p.r + 54, -4);
  ctx.quadraticCurveTo(p.r + 110, -10, p.r + 92, 28);
  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 1.3;
  ctx.stroke();
}
  /* ============================================================
     CELESTIAL WARLOCK — COSMIC STAFF
  ============================================================ */
  else if (w === "cosmicstaff") {
    // SHAFT
    const shaft = ctx.createLinearGradient(p.r, 0, p.r + 50, 0);
    shaft.addColorStop(0, "#ffd700");
    shaft.addColorStop(1, "#ffffff");
    ctx.fillStyle = shaft;
    ctx.fillRect(p.r, -3, 50, 6);

    // ORB
    ctx.beginPath();
    ctx.arc(p.r + 58, 0, 10, 0, Math.PI * 2);

    const orb = ctx.createRadialGradient(p.r + 58, 0, 2, p.r + 58, 0, 10);
    orb.addColorStop(0, "#ffffff");
    orb.addColorStop(0.4, "#9fd4ff");
    orb.addColorStop(1, "#4fd4ff");

    ctx.fillStyle = orb;
    ctx.shadowColor = "#9fd4ff";
    ctx.shadowBlur = 28;
    ctx.fill();

    // Star‑flare lines
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.r + 58, -14);
    ctx.lineTo(p.r + 58, 14);
    ctx.moveTo(p.r + 44, 0);
    ctx.lineTo(p.r + 72, 0);
    ctx.stroke();
  }

  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,W,H);

  ctx.beginPath();
  ctx.arc(center.x, center.y, arenaRadius, 0, Math.PI*2);
  ctx.strokeStyle = arenaTier===1 ? "#f8e38a" : "#aaf";
  ctx.lineWidth = 3;
  ctx.shadowColor = arenaTier===1 ? "#f8e38a" : "#aaf";
  ctx.shadowBlur = 18;
  ctx.stroke();
  ctx.shadowBlur = 0;

  const vg = ctx.createRadialGradient(center.x, center.y, arenaRadius*0.3,
                                      center.x, center.y, arenaRadius*1.05);
  vg.addColorStop(0, "rgba(0,0,0,0)");
  vg.addColorStop(1, "rgba(0,0,0,0.75)");
  ctx.fillStyle = vg;
  ctx.beginPath();
  ctx.arc(center.x, center.y, arenaRadius*1.05, 0, Math.PI*2);
  ctx.fill();

  if (player) {
    ctx.save();
    drawWeapon(ctx, player);

    ctx.translate(player.x, player.y);
    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(0,0,3,0,0,player.r);
    grad.addColorStop(0, player.color.inner);
    grad.addColorStop(0.4, player.color.mid);
    grad.addColorStop(1, player.color.outer);
    ctx.fillStyle = grad;
    ctx.shadowColor = player.color.outer;
    ctx.shadowBlur = 24;
    ctx.fill();
    ctx.restore();
  }

  enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    const g = ctx.createRadialGradient(e.x,e.y,3,e.x,e.y,e.r);
    g.addColorStop(0,"#fff2c4");
    g.addColorStop(0.4,"#ffb347");
    g.addColorStop(1,e.color);
    ctx.fillStyle = g;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r-3, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#000000";
    ctx.font = "bold 12px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(Math.floor(e.hp), e.x, e.y);
  });

  for (let i = hitEffects.length - 1; i >= 0; i--) {
    const e = hitEffects[i];

    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${e.color.r}, ${e.color.g}, ${e.color.b}, ${e.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    e.r += 1.4;
    e.alpha -= 0.07;

    if (e.alpha <= 0) hitEffects.splice(i, 1);
  }

  projectiles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    const pg = ctx.createRadialGradient(p.x,p.y,1,p.x,p.y,p.r);
    pg.addColorStop(0,"#ffffff");
    pg.addColorStop(1,"#7ff0ff");
    ctx.fillStyle = pg;
    ctx.shadowColor = "#7ff0ff";
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

/* ===================================================== */
/* ========== SECTION: GAME LOOP ======================= */
/* ===================================================== */

function loop(t) {
  if (!inGame) return;
  const dt = t - lastTime;
  lastTime = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

/* ===================================================== */
/* ========== SECTION: ASCENSION TRANSITION ============ */
/* ===================================================== */

function showAscensionTransition() {
  const msg = document.getElementById("message");
  msg.textContent = "Ascending...";

  setTimeout(()=>{
    arenaTier = 2;

    /* Unlock Warlock */
    const warlock = classes.find(c=>c.id==="warlock");
    warlock.unlocked = true;

    /* Show Arena II button */
    document.getElementById("arena2Btn").style.display = "inline-block";

    returnToHomeAfterDeath();
  }, 1500);
}

/* ===================================================== */
/* ========== SECTION: DEATH → HOME RESET ============== */
/* ===================================================== */

function returnToHomeAfterDeath() {
  inGame = false;
  inUpgrade = false;
  inForge = false;

  round = 1;
  totalKills = 0;
  bossMode = false;

  document.getElementById("gameUI").style.display = "none";
  document.getElementById("upgradeScreen").style.display = "none";
  document.getElementById("forgeScreen").style.display = "none";
  document.getElementById("mainMenu").style.display = "block";

  updateHUD();
}

/* ===================================================== */
/* ========== SECTION: CAREER / REBIRTH ================ */
/* ===================================================== */

function resetCareer() {
  round = 1;
  gold = 0;
  soulGems = 0;
  totalKills = 0;
  bossMode = false;

  // Reset classes mastery and unlocks except Gladiator and Berserker.
  classes.forEach(c => {
    c.mastery = 0;
    c.unlocked = (c.id === "gladiator" || c.id === "berserker");
  });
}

function rebirth() {
  arenaTier = 2;
  resetCareer();
  document.getElementById("gameUI").style.display="none";
  document.getElementById("upgradeScreen").style.display="none";
  document.getElementById("mainMenu").style.display="block";
  document.getElementById("message").textContent =
    "Rebirth complete. Arena II unlocked.";
}

/* ===================================================== */
/* ========== SECTION: START CAREER ==================== */
/* ===================================================== */

function startCareer() {
  inGame = true;
  inUpgrade = false;
  inForge = false;

  document.getElementById("mainMenu").style.display = "none";
  document.getElementById("upgradeScreen").style.display = "none";
  document.getElementById("forgeScreen").style.display = "none";
  document.getElementById("gameUI").style.display = "block";

  canvas.classList.toggle("arena2", arenaTier===2);

  player = createPlayer();
  enemies = [];
  projectiles = [];
  soulPower = 0;
  soulReady = false;

  spawnEnemies();
  updateHUD();

  document.getElementById("message").textContent =
    "WASD to move, SPACE for Soul Power. Auto Bounce overrides WASD.";

  lastTime = performance.now();
  requestAnimationFrame(loop);
}

/* ===================================================== */
/* ========== SECTION: UPGRADE SCREEN ================== */
/* ===================================================== */

function buildUpgradeScreen() {
  document.getElementById("upgradeGoldLabel").textContent = gold.toFixed(0);

  const prev = currentClass.id;

  const gladiator = classes.find(c=>c.id==="gladiator");
  const berserker = classes.find(c=>c.id==="berserker");
  const mage      = classes.find(c=>c.id==="mage");
  const monk      = classes.find(c=>c.id==="monk");
  const paladin   = classes.find(c=>c.id==="paladin");
  const assassin  = classes.find(c=>c.id==="assassin");
  const grim      = classes.find(c=>c.id==="grim");
  const warlock   = classes.find(c=>c.id==="warlock");

  // Monk unlock
  if (gladiator.mastery >= 2) monk.unlocked = true;

  // Paladin unlock
  if (berserker.mastery >= 2) paladin.unlocked = true;

  // Mage unlock
  if (monk.mastery >= 2 && paladin.mastery >= 2) mage.unlocked = true;

  // Assassin unlock
  if (mage.mastery >= 2) assassin.unlocked = true;

  // Grim unlock
  const others = classes.filter(c=>c.id!=="grim" && c.id!=="warlock");
  if (others.every(c=>c.mastery >= 3)) grim.unlocked = true;

  // ⭐ NEW: Warlock unlock (Ascension 1+)
  if (ascension >= 1) warlock.unlocked = true;

  // Rebuild dropdown
  const sel = document.getElementById("classSelect");
  sel.innerHTML = "";

  classes.forEach(c => {
    if (c.unlocked) {
      const o = document.createElement("option");
      o.value = c.id;
      o.textContent = c.name + " (Mastery " + c.mastery + ")";
      sel.appendChild(o);
    }
  });

  sel.value = prev;
  currentClass = classes.find(c => c.id === prev);

  // Build upgrade cards
  const list = document.getElementById("upgradeList");
  list.innerHTML = "";
  upgrades.forEach(u=>{
    const card = document.createElement("div");
    card.className = "upgradeCard";
    card.innerHTML = `<b>${u.name}</b><br>Cost: ${u.cost}`;
    const b = document.createElement("button");
    b.textContent = "Buy";
    b.onclick = ()=>{
      if (gold >= u.cost) {
        gold -= u.cost;
        u.fn(player);
        buildUpgradeScreen();
        updateHUD();
      }
    };
    card.appendChild(b);
    list.appendChild(card);
  });
}

/* ===================================================== */
/* ========== SECTION: FORGE SCREEN ===================== */
/* ===================================================== */

function buildForgeScreen() {
  document.getElementById("forgeSoulGemsLabel").textContent = soulGems;

  const list = document.getElementById("forgeList");
  list.innerHTML = "";

  forgeUpgrades.forEach(u=>{
    const card = document.createElement("div");
    card.className = "upgradeCard";
    card.innerHTML = `<b>${u.name}</b><br>Cost: ${u.cost}`;
    const b = document.createElement("button");
    b.textContent = "Forge";
    b.onclick = ()=>{
      if (soulGems >= u.cost) {
        soulGems -= u.cost;
        u.fn();
        buildForgeScreen();
        updateHUD();
      }
    };
    card.appendChild(b);
    list.appendChild(card);
  });
}

/* ===================================================== */
/* ========== SECTION: BUTTONS & FLOW ================== */
/* ===================================================== */

document.getElementById("beginCareerBtn").onclick = () => {
  arenaTier = 1;
  resetCareer();
  startCareer();
};

document.getElementById("arena2Btn").onclick = () => {
  arenaTier = 2;
  resetCareer();
  startCareer();
};

document.getElementById("forgeMenuBtn").onclick = () => {
  inForge = true;
  inGame = false;
  inUpgrade = false;

  document.getElementById("mainMenu").style.display = "none";
  document.getElementById("gameUI").style.display = "none";
  document.getElementById("upgradeScreen").style.display = "none";

  document.getElementById("forgeScreen").style.display = "block";
  buildForgeScreen();
};

document.getElementById("backToMenuFromForgeBtn").onclick = () => {
  inForge = false;
  inGame = false;
  inUpgrade = false;

  document.getElementById("forgeScreen").style.display = "none";
  document.getElementById("mainMenu").style.display = "block";
};

document.getElementById("startNextRoundBtn").onclick = () => {
  const id = document.getElementById("classSelect").value;
  const cls = classes.find(c=>c.id===id);
  if (cls) currentClass = cls;

  player = createPlayer();
  soulPower = 0;
  soulReady = false;

  inUpgrade = false;
  document.getElementById("upgradeScreen").style.display="none";
  document.getElementById("gameUI").style.display="block";

  spawnEnemies();
  updateHUD();

  inGame = true;
  lastTime = performance.now();
  requestAnimationFrame(loop);
};

/* ===================================================== */
/* ========== SECTION: DEV RESET FIX ==================== */
/* ===================================================== */

function resetDevState() {
  ascension = 0;
  arenaTier = 1;
  gold = 0;
  soulGems = 0;
  round = 1;
  totalKills = 0;

  classes.forEach(c => c.mastery = 0);
  classes.forEach(c => c.unlocked = (c.id==="gladiator" || c.id==="berserker"));

  document.getElementById("arena2Btn").style.display = "none";

  returnToHomeAfterDeath();
}
</script>
